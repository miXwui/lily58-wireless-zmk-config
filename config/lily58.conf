# https://zmk.dev/docs/config/power
# Set to n to disable deep sleep
CONFIG_ZMK_SLEEP=y
# Times are in ms.
# 30s: idle state (display/LEDs off, BLE still connected, keyboard responsive)
CONFIG_ZMK_IDLE_TIMEOUT=30000
# 20min: deep sleep (BLE disconnects, very low power, 1–2s reconnect on wake)
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1200000

# Disable TX power boost (saves an estimated 1–2 days/week battery and should be
# enough for same-room use)
# # CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Bluetooth: disable 2M PHY for wider adapter compatibility (Intel, Realtek)
# Fixes pairing/disconnect issues on Linux 7.1+
# https://github.com/zmkfirmware/zmk/issues/1487
# https://github.com/zmkfirmware/zmk/issues/3158#issuecomment-3688452642
CONFIG_BT_CTLR_PHY_2M=n

# BLE connection interval: force 7.5ms (default: 7.5–15ms)
# Lower: less latency (better for gaming), slightly more battery drain
# default CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6 (7.5ms)
# default CONFIG_BT_PERIPHERAL_PREF_MAX_INT=12 (15ms)
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=6

# CONFIG_ZMK_BLE_EXPERIMENTAL_FEATURES=y  # Enable for convenience features:
#   ├── ZMK_BLE_EXPERIMENTAL_CONN
#   │   └── BT_CTLR_PHY_2M=n               # Disable 2M PHY (we set this above)
#   └── ZMK_BLE_EXPERIMENTAL_SEC
#       └── imply BT_SMP_ALLOW_UNAUTH_OVERWRITE  # Let new hosts overwrite old bonds
#            └── imply ZMK_BLE_PASSKEY_ENTRY      # Suggests passkey entry on keyboard
#
# **Warning:** "imply" sets the default—not explicitly setting CONFIG_ZMK_BLE_PASSKEY_ENTRY=n
# means passkey entry is silently enabled. You'll have to type a 6-digit code shown by
# bluetoothctl on the keyboard during pairing. This caught us off guard during debugging.
#
# Not needed: we use BT_CTLR_PHY_2M=n directly and clear bonds manually with &bt BT_CLR.
#
# CONFIG_ZMK_BLE_PASSKEY_ENTRY=y            # Removed: required typing 6-digit code
#                                            # shown by bluetoothctl on the keyboard
#                                            # during pairing. Impossible without a display.
#                                            # Inconvenient for personal use.

# https://zmk.dev/docs/features/battery
# Enable peripheral battery monitoring
# https://zmk.dev/docs/config/battery#peripheral-battery-monitoring
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

# Enable eager debouncing
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=7

# https://zmk.dev/docs/keymaps/behaviors/mouse-emulation
CONFIG_ZMK_POINTING=y

# LED status indicator
# https://github.com/BlueDrink9/zmk-poor-mans-led-indicator
#
# The nice!nano has one blue LED on GPIO0 pin 15 (active LOW).
# All blinks are on the left (central) half unless noted.
#
# Power estimate per blink: ~3mA × 70ms = 0.21mAh per blink.
# At 50 blinks/day: 50 × 0.21 = 10.5mAh/week = ~10% of 110mAh battery = ~1 day/week.
# Disabling layer blinks saves the most, as they trigger on every modifier hold.
#
# Module settings:
#   INDICATOR_LED_INTERVAL_MS            - Min wait between blink sequences (default: 500ms)
#   INDICATOR_LED_BATTERY_LEVEL_HIGH     - High battery threshold (default: 80%)
#   INDICATOR_LED_BATTERY_LEVEL_LOW      - Low battery threshold (default: 20%)
#   INDICATOR_LED_BATTERY_LEVEL_CRITICAL - Critical battery threshold (default: 5%)
#   INDICATOR_LED_BATTERY_*_BLINK_REPEAT - Blink count per level (default: high=2, low=4, critical=6)
#
# What each indicator does:
#
# Nice!nano power-on: 2 quick blinks (Adafruit bootloader, before ZMK starts)
#
# Left side (central) boot sequence:
#   1. Battery on boot (queued first):
#      More blinks = more urgency to charge
#      >80% = 2 slow blinks ({500ms, 500ms} × 2)
#      20–80% = 4 medium blinks ({100ms, 100ms} × 4)
#      <20% = 6 frantic blinks ({40ms, 40ms} × 6)
#   2. BLE on boot (polls every 200ms, up to 5s):
#      Connected: N blinks ({1000ms on, 100ms off} × profile_index + 1)
#      Open/advertising: N blinks ({80ms, 80ms} × profile_index + 1)
#      Not connected: N blinks ({200ms on, 800ms off} × profile_index + 1)
#   3. BLE profile changes (queued as profiles connect):
#      Same patterns as above, triggered by profile switch events
#
# Right side (peripheral) boot sequence:
#   1. Battery on boot (same as left)
#   2. BLE on boot (polls every 200ms, up to 5s):
#      Connected: 1 long blink ({1000ms on, 100ms off})
#      Not connected: 10 slow blinks ({200ms on, 800ms off} × 10)
#   Note: LED polls for BLE connection every 200ms for up to 5s.
#         Proceeds as soon as connected. Handles quick power cycles.
#
# LAYER_CHANGE               - On layer switch: blinks N times for layer number
#                                Triggers on every modifier hold (frequent, battery-heavy)
# CRITICAL_BATTERY_CHANGES   - During use, when battery <5%: frantic 6 blinks on every
#                                battery level change (separate from battery-on-boot blinks)
#
# enabled/disabled:
CONFIG_INDICATOR_LED_WIDGET=y
CONFIG_INDICATOR_LED_SHOW_LAYER_CHANGE=n       # OFF: blinks on every layer switch (battery-heavy)
CONFIG_INDICATOR_LED_SHOW_PERIPHERAL_BLE=y     # ON:  right half shows connection status
# Defaults kept:
#   INDICATOR_LED_SHOW_BATTERY_ON_BOOT=y       # ON:  blink battery on power-on
#   INDICATOR_LED_SHOW_BLE=y                   # ON:  blink BT profile on switch
#   INDICATOR_LED_SHOW_CRITICAL_BATTERY_CHANGES=y  # ON:  frantic blinks when <5%
